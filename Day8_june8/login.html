<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Login form</h1>
    <input type="text" name="" id="user" placeholder="Enter username">
    <br>
    <br>
    <input type="password" name="" id="pass" placeholder="Enter password">
    <button onclick="getData()">Login</button>
    <h1 id="msg"></h1>
    <script>
        
        var u="Admin"
        var p="1234"
        function getData()
        {
        var msg=document.getElementById("msg")
           var a=document.getElementById("user")
           var b=document.getElementById("pass")
           if(a.value==u)
           {
            if(p==b.value)
           {
                msg.innerHTML="login successfully"
           }
           else{
             msg.innerHTML="password is incorrect"
           }
           }
           else
           {
            msg.innerHTML="username not found"
           }
        }
    </script>
</body>
</html>
