<body>
    <script>
      var a=new Number(prompt("enter first number"))
      var b=new Number(prompt("enter second number"))
      var c=new Number(prompt("enter third number"))
      var max=((a>b)?((a>c)?a:c):((b>c)?b:c))
      document.write("greater ",max);

    </script>
