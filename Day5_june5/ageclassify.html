<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classification Of Age Group</title>
</head>
<body>
    <h1>Classification Of Age Group</h1>
    <script>
        var age = Number(prompt("enter your age: "));

        if(age<=12){
            document.write("child");
        }
        else if(age<=19){
            document.write("teen");
        }
        else if(age<=59){
            document.write("adult");
        }
        else{
            document.write("senior")
        }
    
    </script>
</body>
</html>
