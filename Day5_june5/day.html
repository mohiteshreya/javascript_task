<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var ch=Number(prompt("enter a number(1-7)"))
        switch(ch)
        {
            case 1:document.write("sunday")
            break
            case 2:document.write("monday")
            break
            case 3:document.write("tuesday")
            break
            case 4:document.write("wenesday")
            break
            case 5:document.write("thursday")
            break
            case 6:document.write("friday")
            break
            case 7:document.write("saturday")
            break
            default:document.write("invalid choice enter choice between (1-7)")
        }
    </script>
</body>
</html>
