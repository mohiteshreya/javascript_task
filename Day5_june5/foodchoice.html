<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var ch=Number(prompt("food menu\n 1 pizza \n 2 burger \n 3 sandwhich \n 4 pasta \n enter your choice"))
        switch(ch)
        {
            case 1:document.write("pizza is selected")
            break
            case 2:document.write("Burger is selected")
            break
            case 3:document.write("sandwhich is selected")
            break
            case 4:document.write("pasta is selected")
            break
            default:document.write("enter a valid choice(1-4)")
        }

    </script>
</body>
</html>
