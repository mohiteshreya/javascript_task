<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box
        {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            border-radius: 50%;
            margin-left: 350px;
        }
    </style>
</head>
<body>
    <div class="box" onmouseover="changecolour()" onmouseout="changecolour1()" id="b1"></div>
    <div class="box" onmouseover="changecolour2()" onmouseout="changecolour3()" id="b2"></div>
    <div class="box" onmouseover="changecolour4()" onmouseout="changecolour5()" id="b3"></div>
    <script>
      let b1=document.getElementById("b1")
      let b2=document.getElementById("b2")
      let b3=document.getElementById("b3")
      function changecolour()
      {
        b1.style.backgroundColor="red"
      }
      function changecolour1()
      {
        b1.style.backgroundColor="white"
      }
      function changecolour2()
      {
        b2.style.backgroundColor="yellow"
      }
      function changecolour3()
      {
        b2.style.backgroundColor="white"
      }
      function changecolour4()
      {
        b3.style.backgroundColor="green"
      }
      function changecolour5()
      {
        b3.style.backgroundColor="white"
      }
    </script>
    
</body>
</html>
