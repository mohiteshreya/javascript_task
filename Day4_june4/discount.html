<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var bill=Number(prompt("enter bill amount:"))
        var discount,finalbill
        if(bill>5000)
    {
discount=bill*0.2
    }
    else if(bill>3000)
    {
        discount=bill*0.1
    }
    else if(bill>1000)
    {
        discount=bill*0.05
    }
    else
    {
        discount=0
    }
    finalbill=bill-discount
    document.write("final bill :",finalbill)
    </script>
   
    
</body>
</html>
